<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>

    <!-- Neon purple glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow filter for corners -->
    <filter id="cornerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline gradient -->
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00eaff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00eaff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </linearGradient>

    <!-- Side shimmer gradient -->
    <linearGradient id="shimmerLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c77dff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmerRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#00eaff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </linearGradient>

    <!-- Top shimmer gradient -->
    <linearGradient id="shimmerTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for rounded corners on image -->
    <clipPath id="bannerClip">
      <rect x="8" y="8" width="884" height="384" rx="16" ry="16"/>
    </clipPath>

    <!-- Particle gradient -->
    <radialGradient id="particle1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c77dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="particle2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00eaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- Dark background -->
  <rect width="900" height="400" rx="20" ry="20" fill="#0d1117"/>

  <!-- Embedded banner image (clipped) -->
  <image href="./Sachinxcode-01.jpg" x="8" y="8" width="884" height="384"
         preserveAspectRatio="xMidYMid slice" clip-path="url(#bannerClip)"/>

  <!-- Dark overlay vignette so neon stands out -->
  <rect x="8" y="8" width="884" height="384" rx="16" ry="16"
        fill="url(#scanline)" opacity="0.5"/>

  <!-- ══════════════════════════════════════════ -->
  <!--           ANIMATED SCAN LINE             -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="8" y="8" width="884" height="60" rx="0" fill="url(#scanline)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,340; 0,0" dur="4s" repeatCount="indefinite"
      calcMode="linear"/>
    <animate attributeName="opacity" values="0; 0.6; 0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ══════════════════════════════════════════ -->
  <!--        NEON BORDER — main rectangle      -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Purple glow border -->
  <rect x="4" y="4" width="892" height="392" rx="18" ry="18"
        fill="none" stroke="#c77dff" stroke-width="2" filter="url(#neonGlow)">
    <animate attributeName="stroke-opacity" values="0.6; 1; 0.6" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Cyan inner border -->
  <rect x="8" y="8" width="884" height="384" rx="16" ry="16"
        fill="none" stroke="#00eaff" stroke-width="1" filter="url(#cyanGlow)">
    <animate attributeName="stroke-opacity" values="1; 0.3; 1" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- ══════════════════════════════════════════ -->
  <!--          ANIMATED CORNER BRACKETS        -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Top-Left corner -->
  <g filter="url(#cornerGlow)">
    <polyline points="8,50 8,8 50,8" fill="none" stroke="#c77dff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke" values="#c77dff;#00eaff;#c77dff" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Top-Right corner -->
  <g filter="url(#cornerGlow)">
    <polyline points="850,8 892,8 892,50" fill="none" stroke="#00eaff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke" values="#00eaff;#c77dff;#00eaff" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Bottom-Left corner -->
  <g filter="url(#cornerGlow)">
    <polyline points="8,350 8,392 50,392" fill="none" stroke="#00eaff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke" values="#00eaff;#c77dff;#00eaff" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Bottom-Right corner -->
  <g filter="url(#cornerGlow)">
    <polyline points="850,392 892,392 892,350" fill="none" stroke="#c77dff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke" values="#c77dff;#00eaff;#c77dff" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!--       ANIMATED SIDE SHIMMER BARS         -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Left shimmer bar -->
  <rect x="8" y="8" width="80" height="384" fill="url(#shimmerLeft)" rx="16" ry="0">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Right shimmer bar -->
  <rect x="812" y="8" width="80" height="384" fill="url(#shimmerRight)" rx="0" ry="0">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- ══════════════════════════════════════════ -->
  <!--    TOP ANIMATED HORIZONTAL LIGHT SWEEP   -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="-200" y="8" width="300" height="4" fill="url(#shimmerTop)" rx="2">
    <animateTransform attributeName="transform" type="translate"
      values="-300,0; 900,0; -300,0" dur="3s" repeatCount="indefinite" calcMode="easeInOut"/>
  </rect>
  <!-- Bottom sweep (opposite direction) -->
  <rect x="800" y="388" width="300" height="4" fill="url(#shimmerTop)" rx="2">
    <animateTransform attributeName="transform" type="translate"
      values="100,0; -900,0; 100,0" dur="3s" repeatCount="indefinite" calcMode="easeInOut"/>
  </rect>

  <!-- ══════════════════════════════════════════ -->
  <!--           FLOATING PARTICLES             -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Particle 1 -->
  <circle cx="50" cy="80" r="4" fill="url(#particle1)">
    <animate attributeName="cy" values="80;20;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 2 -->
  <circle cx="150" cy="350" r="3" fill="url(#particle2)">
    <animate attributeName="cy" values="350;280;350" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <!-- Particle 3 -->
  <circle cx="750" cy="60" r="5" fill="url(#particle1)">
    <animate attributeName="cy" values="60;130;60" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="1;0;1" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Particle 4 -->
  <circle cx="840" cy="300" r="3" fill="url(#particle2)">
    <animate attributeName="cy" values="300;240;300" dur="6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <!-- Particle 5 -->
  <circle cx="420" cy="30" r="2.5" fill="url(#particle1)">
    <animate attributeName="cx" values="420;460;420" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <!-- Particle 6 -->
  <circle cx="600" cy="370" r="4" fill="url(#particle2)">
    <animate attributeName="cx" values="600;560;600" dur="5s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- ══════════════════════════════════════════ -->
  <!--     ANIMATED CIRCUIT LINE — TOP         -->
  <!-- ══════════════════════════════════════════ -->
  <path d="M 8 30 L 80 30 L 100 15 L 200 15" fill="none" stroke="#c77dff" stroke-width="1" opacity="0.5">
    <animate attributeName="stroke-dasharray" values="0,300;300,0;0,300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 892 30 L 820 30 L 800 15 L 700 15" fill="none" stroke="#00eaff" stroke-width="1" opacity="0.5">
    <animate attributeName="stroke-dasharray" values="0,300;300,0;0,300" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </path>
  <!-- Bottom circuit lines -->
  <path d="M 8 370 L 80 370 L 100 385 L 200 385" fill="none" stroke="#00eaff" stroke-width="1" opacity="0.5">
    <animate attributeName="stroke-dasharray" values="0,300;300,0;0,300" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" begin="2s"/>
  </path>
  <path d="M 892 370 L 820 370 L 800 385 L 700 385" fill="none" stroke="#c77dff" stroke-width="1" opacity="0.5">
    <animate attributeName="stroke-dasharray" values="0,300;300,0;0,300" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </path>

  <!-- ══════════════════════════════════════════ -->
  <!--          PULSING CORNER DOTS             -->
  <!-- ══════════════════════════════════════════ -->
  <!-- TL -->
  <circle cx="8" cy="8" r="5" fill="#c77dff" filter="url(#neonGlow)">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- TR -->
  <circle cx="892" cy="8" r="5" fill="#00eaff" filter="url(#cyanGlow)">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- BL -->
  <circle cx="8" cy="392" r="5" fill="#00eaff" filter="url(#cyanGlow)">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <!-- BR -->
  <circle cx="892" cy="392" r="5" fill="#c77dff" filter="url(#neonGlow)">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

</svg>
