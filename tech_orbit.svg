<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Core Sun Gradient -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#c77dff"/>
      <stop offset="70%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#1d0d3a"/>
    </radialGradient>

    <!-- Planet Gradients -->
    <radialGradient id="jsGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5cc"/>
      <stop offset="40%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#b39300"/>
    </radialGradient>

    <radialGradient id="htmlGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffebe0"/>
      <stop offset="40%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#b33600"/>
    </radialGradient>

    <radialGradient id="tailwindGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>

    <radialGradient id="reactGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0ffff"/>
      <stop offset="40%" stop-color="#00eaff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </radialGradient>

    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f8f0"/>
      <stop offset="40%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#1b7a2d"/>
    </radialGradient>

    <radialGradient id="fastapiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d7f5f0"/>
      <stop offset="40%" stop-color="#009688"/>
      <stop offset="100%" stop-color="#00564d"/>
    </radialGradient>

    <radialGradient id="flutterGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="40%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>

    <radialGradient id="mongoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="40%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>

    <radialGradient id="pythonGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="40%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </radialGradient>

    <radialGradient id="cppGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="40%" stop-color="#3f51b5"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </radialGradient>

    <radialGradient id="aiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0f5"/>
      <stop offset="40%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#a01050"/>
    </radialGradient>

    <!-- Title Gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="900" height="460" rx="18" fill="url(#spaceBg)"/>

  <!-- Glowing outer card border -->
  <rect x="1.5" y="1.5" width="897" height="457" rx="17" fill="none" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Star Dust Background -->
  <g opacity="0.6">
    <circle cx="150" cy="80" r="1" fill="#fff"><animate attributeName="opacity" values="0.1;1;0.1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="120" r="1.2" fill="#00eaff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="380" r="0.8" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="360" r="1" fill="#c77dff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="60" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="290" r="0.8" fill="#ff6b6b"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="300" r="1" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Title & Subtitle -->
  <text x="450" y="45" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="800" fill="url(#titleGrad)" filter="url(#neonGlow)">
    &#127756; Tech Stack Solar System
  </text>
  <text x="450" y="65" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666" letter-spacing="4">
    ORBITING CORE TECHNOLOGIES &amp; FRAMEWORKS
  </text>

  <!-- === ORBITS (Ellipses with perspective) === -->
  <ellipse id="orbit1" cx="450" cy="245" rx="160" ry="50" fill="none" stroke="#7b2ff7" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>
  <ellipse id="orbit2" cx="450" cy="245" rx="250" ry="80" fill="none" stroke="#00eaff" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <ellipse id="orbit3" cx="450" cy="245" rx="340" ry="110" fill="none" stroke="#39d353" stroke-width="1" stroke-dasharray="8,4" opacity="0.25"/>
  <ellipse id="orbit4" cx="450" cy="245" rx="420" ry="140" fill="none" stroke="#f7971e" stroke-width="1" stroke-dasharray="10,5" opacity="0.2"/>

  <!-- === CENTRAL SUN (The Developer Core) === -->
  <g transform="translate(450, 245)">
    <circle cx="0" cy="0" r="45" fill="url(#sunGrad)" opacity="0.3" filter="url(#strongGlow)">
      <animate attributeName="r" values="40;48;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="32" fill="url(#sunGrad)" filter="url(#neonGlow)"/>
    <ellipse cx="0" cy="0" rx="48" ry="15" fill="none" stroke="#c77dff" stroke-width="1" opacity="0.6" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="48" ry="15" fill="none" stroke="#00eaff" stroke-width="1" opacity="0.4" transform="rotate(20)"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="1">SACHIN</text>
  </g>

  <!-- ==================== ORBITING PLANETS ==================== -->

  <!-- === ORBIT 1: JS, HTML/CSS, Tailwind === -->
  <g>
    <circle r="12" fill="url(#jsGrad)" filter="url(#neonGlow)"/>
    <text y="-18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffd200">JS</text>
    <animateMotion dur="7s" repeatCount="indefinite" path="M 450,245 m -160,0 a 160,50 0 1,0 320,0 a 160,50 0 1,0 -320,0"/>
  </g>
  <g>
    <circle r="11" fill="url(#htmlGrad)" filter="url(#neonGlow)"/>
    <text y="-17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#ff6b35">HTML/CSS</text>
    <animateMotion dur="7s" begin="-2.33s" repeatCount="indefinite" path="M 450,245 m -160,0 a 160,50 0 1,0 320,0 a 160,50 0 1,0 -320,0"/>
  </g>
  <g>
    <circle r="11" fill="url(#tailwindGrad)" filter="url(#neonGlow)"/>
    <text y="-17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#38bdf8">Tailwind</text>
    <animateMotion dur="7s" begin="-4.66s" repeatCount="indefinite" path="M 450,245 m -160,0 a 160,50 0 1,0 320,0 a 160,50 0 1,0 -320,0"/>
  </g>

  <!-- === ORBIT 2: React, Node.js, FastAPI === -->
  <g>
    <circle r="15" fill="url(#reactGrad)" filter="url(#neonGlow)"/>
    <ellipse cx="0" cy="0" rx="20" ry="7" fill="none" stroke="#00eaff" stroke-width="0.7" transform="rotate(30)"/>
    <text y="-22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#00eaff">React</text>
    <animateMotion dur="12s" repeatCount="indefinite" path="M 450,245 m -250,0 a 250,80 0 1,0 500,0 a 250,80 0 1,0 -500,0"/>
  </g>
  <g>
    <circle r="14" fill="url(#nodeGrad)" filter="url(#neonGlow)"/>
    <text y="-21" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#39d353">Node.js</text>
    <animateMotion dur="12s" begin="-4s" repeatCount="indefinite" path="M 450,245 m -250,0 a 250,80 0 1,0 500,0 a 250,80 0 1,0 -500,0"/>
  </g>
  <g>
    <circle r="13" fill="url(#fastapiGrad)" filter="url(#neonGlow)"/>
    <text y="-20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#12c9b6">FastAPI</text>
    <animateMotion dur="12s" begin="-8s" repeatCount="indefinite" path="M 450,245 m -250,0 a 250,80 0 1,0 500,0 a 250,80 0 1,0 -500,0"/>
  </g>

  <!-- === ORBIT 3: Flutter, MongoDB === -->
  <g>
    <circle r="15" fill="url(#flutterGrad)" filter="url(#neonGlow)"/>
    <text y="-22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#29b6f6">Flutter</text>
    <animateMotion dur="18s" repeatCount="indefinite" path="M 450,245 m -340,0 a 340,110 0 1,0 680,0 a 340,110 0 1,0 -680,0"/>
  </g>
  <g>
    <circle r="13" fill="url(#mongoGrad)" filter="url(#neonGlow)"/>
    <text y="-20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#4caf50">MongoDB</text>
    <animateMotion dur="18s" begin="-9s" repeatCount="indefinite" path="M 450,245 m -340,0 a 340,110 0 1,0 680,0 a 340,110 0 1,0 -680,0"/>
  </g>

  <!-- === ORBIT 4: Python, C++, AI/ML === -->
  <g>
    <circle r="14" fill="url(#pythonGrad)" filter="url(#neonGlow)"/>
    <text y="-21" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffd54f">Python</text>
    <animateMotion dur="25s" repeatCount="indefinite" path="M 450,245 m -420,0 a 420,140 0 1,0 840,0 a 420,140 0 1,0 -840,0"/>
  </g>
  <g>
    <circle r="13" fill="url(#cppGrad)" filter="url(#neonGlow)"/>
    <text y="-20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#7986cb">C++ / DSA</text>
    <animateMotion dur="25s" begin="-8.33s" repeatCount="indefinite" path="M 450,245 m -420,0 a 420,140 0 1,0 840,0 a 420,140 0 1,0 -840,0"/>
  </g>
  <g>
    <circle r="14" fill="url(#aiGrad)" filter="url(#neonGlow)"/>
    <text y="-21" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ff6b9d">AI / ML</text>
    <animateMotion dur="25s" begin="-16.66s" repeatCount="indefinite" path="M 450,245 m -420,0 a 420,140 0 1,0 840,0 a 420,140 0 1,0 -840,0"/>
  </g>

</svg>
